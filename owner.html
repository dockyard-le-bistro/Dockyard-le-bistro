<!DOCTYPE html>
<html>
<head>

<title>Dockyard Le Bistro - Owner Orders</title>

<style>

body{
    font-family:Arial;
    background:#fff8e1;
    padding:20px;
}


h1{
    text-align:center;
    color:#d32f2f;
}


#loginBox{

    background:white;
    max-width:350px;
    margin:50px auto;
    padding:20px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 3px 10px #ccc;

}


#loginBox input{

    width:90%;
    padding:10px;
    margin:10px;

}


button{

    padding:8px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin:5px;

}


.order-card{

    background:white;
    padding:15px;
    margin:15px 0;
    border-radius:12px;
    box-shadow:0 3px 10px #ccc;

}


.paid{

    background:green;
    color:white;

}


.delete{

    background:red;
    color:white;

}


.call{

    background:#2196f3;
    color:white;

}


</style>

</head>


<body>


<div id="loginBox">

<h2>🔒 Owner Login</h2>


<input 
type="password"
id="ownerPassword"
placeholder="Enter Password">


<button onclick="ownerLogin()">
Login
</button>


<p id="loginError"></p>


</div>




<div id="ownerPanel" style="display:none;">


<h1>
🍽️ Dockyard Le Bistro Orders
</h1>


<div id="orders">

Loading Orders...

</div>


</div>





<script type="module">


import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import { 
getDatabase,
ref,
onValue,
update,
remove
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

import {
getMessaging,
getToken
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";

const OWNER_PASSWORD = "Sunny@167";

// Check saved owner login
if(localStorage.getItem("ownerLoggedIn") === "true"){

document.getElementById("loginBox").style.display="none";
document.getElementById("ownerPanel").style.display="block";

}

window.ownerLogin=function(){


let pass=document.getElementById("ownerPassword").value;


if(pass===OWNER_PASSWORD){

localStorage.setItem("ownerLoggedIn","true");
document.getElementById("loginBox").style.display="none";


document.getElementById("ownerPanel").style.display="block";


}

else{


document.getElementById("loginError").innerText="Wrong Password";


}


};





const firebaseConfig = {

apiKey: "AIzaSyAuaFGwNjJtV0mcXZ7Tw734R0Q4HzChs1k",

authDomain: "dockyard-le-bistro.firebaseapp.com",

databaseURL: "https://dockyard-le-bistro-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId: "dockyard-le-bistro",

storageBucket: "dockyard-le-bistro.firebasestorage.app",

messagingSenderId: "991617661975",

appId: "1:991617661975:web:9d69822a65b19fe31a3052"

};



const app = initializeApp(firebaseConfig);

const messaging = getMessaging(app);
async function enableNotifications(){

const permission = await Notification.requestPermission();

if(permission === "granted"){

const token = await getToken(messaging,{
vapidKey:"BF5PqMtgYa5QN9oiPSv-4EjF5XT3u3LLPJBKokh6ibOQ4dU5EViJ8vjKbCFGKE8-dPzwwiy5TlAYclLacOCo27Y"

});

alert("OWNER TOKEN:\n\n" + token);

}

}
alert("Notification function start");
enableNotifications();
const db = getDatabase(app);



const ordersDiv=document.getElementById("orders");

let ordersData = {};



onValue(ref(db,"orders"),(snapshot)=>{


ordersDiv.innerHTML="";


let data=snapshot.val();

ordersData = data;

if(!data){

ordersDiv.innerHTML="No Orders";

return;

}



Object.keys(data).reverse().forEach(id=>{


let order=data[id];


let items="";


order.items.forEach(item=>{


items += item.name+" x "+item.qty+"<br>";


});



ordersDiv.innerHTML += `


<div class="order-card">


<h3>🍽️ New Order</h3>


<b>Name:</b> ${order.customerName}<br>

<b>Phone:</b> ${order.customerPhone}<br>

<b>Address:</b> ${order.customerAddress}

<br><br>


<b>Items:</b><br>

${items}


<br>


<b>Total:</b> ₹${order.total}

<br>


<b>Status:</b> ${order.paymentStatus}


<br>


<b>Time:</b> ${order.orderTime}


<br><br>


<a href="tel:${order.customerPhone}">

<button class="call">
📞 Call Customer
</button>

</a>



<button class="paid" onclick="markPaid('${id}')">

✅ Mark Paid

</button>

<button class="call" onclick="sendPayment('${id}')">
💳 Send Payment Request
</button>

<button class="delete" onclick="deleteOrder('${id}')">

🗑 Delete

</button>


</div>


`;


});


});






window.markPaid=function(id){


update(ref(db,"orders/"+id),{

paymentStatus:"Paid"

});


};






window.deleteOrder=function(id){


if(confirm("Delete this order?")){


remove(ref(db,"orders/"+id));


}


};

window.sendPayment=function(id){

let order = ordersData[id];


let message =
"🍽️ Dockyard Le Bistro\n\n" +
"Hello " + order.customerName + ",\n\n" +

"💳 To proceed with your payment, please click on the payment amount below and complete your payment.\n\n" +

"Once the payment is completed, kindly share the payment screenshot with us for order confirmation.\n\n" +

"💰 Amount: ₹" + order.total +

"\n\nThank you for choosing Dockyard Le Bistro 🌱";



let url =
"https://wa.me/" +
order.customerPhone +
"?text=" +
encodeURIComponent(message);



window.open(url,"_blank");


};

</script>


</body>
</html>
