<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dockyard Le Bistro</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<header>

<div class="logo">
🍽️ Dockyard Le Bistro
</div>

<input
type="text"
id="search"
placeholder="Search your favourite food..."
onkeyup="searchFood()">

</header>

<section class="hero">

<h1>Delicious Food Delivered Fresh</h1>

<p>Fresh • Hygienic • Affordable</p>

</section>

<div class="category">

<button class="active">All</button>
<button>Kulcha</button>
<button>Pizza</button>
<button>Burger</button>
<button>Chinese</button>
<button>Drinks</button>

</div>

<section class="menu" id="menu">

<!-- ITEM -->

<div class="card">

<div class="badge">
Best Seller
</div>

<img src="https://images.unsplash.com/photo-1601050690597-df0568f70950?w=600">

<h2>Aloo Kulcha</h2>

<p>₹70</p>

<button
id="btn1"
onclick="addToCart('Aloo Kulcha',70,'btn1')">
Add
</button>

</div>

<!-- ITEM -->

<div class="card">

<img src="https://images.unsplash.com/photo-1628294895950-9805252327bc?w=600">

<h2>Paneer Kulcha</h2>

<p>₹120</p>

<button
id="btn2"
onclick="addToCart('Paneer Kulcha',120,'btn2')">
Add
</button>

</div>

<!-- ITEM -->

<div class="card">

<img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=600">

<h2>Margherita Pizza</h2>

<p>₹249</p>

<button
id="btn3"
onclick="addToCart('Pizza',249,'btn3')">
Add
</button>

</div>

<!-- ITEM -->

<div class="card">

<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600">

<h2>Cheese Burger</h2>

<p>₹149</p>

<button
id="btn4"
onclick="addToCart('Burger',149,'btn4')">
Add
</button>

</div>

</section>

<!-- Floating Cart -->

<div class="cart-btn" onclick="openCart()">

🛒

<span id="count">
0
</span>

</div>

<!-- Cart -->

<div class="cart" id="cart">

<div class="cart-header">

<h2>Your Cart</h2>

<i class="fa fa-times"
onclick="closeCart()"></i>

</div>

<div id="cartItems"></div>

<h3>

Total :

₹ <span id="total">0</span>

</h3>

<button
class="pay"

onclick="openPayment()">

Pay Now

</button>

<button
class="whatsapp"

onclick="sendWhatsApp()">

WhatsApp Order

</button>

</div>

<!-- Payment Popup -->

<div id="paymentPopup"
class="payment-popup">

<div class="payment-box">

<span
onclick="closePayment()"
class="close">

×

</span>

<h2>

Scan & Pay

</h2>

<img
src="phonepe-qr.png"
class="qr">

<p>

After Payment Click WhatsApp Order

</p>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
